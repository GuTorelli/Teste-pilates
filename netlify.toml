[build]
  command   = "pnpm build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# SPA fallback (also enforced by public/_redirects)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Performance headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options    = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy    = "strict-origin-when-cross-origin"
